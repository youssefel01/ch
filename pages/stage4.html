<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOG_DEB_0x7b2e84</title>
  <style>
    body {
      background: #000;
      margin: 0;
      display: flex;
      justify-content: center;
      padding: 50px 0;
      overflow-y: scroll;
      /* Hide scrollbar for Chrome, Safari and Opera */
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    body::-webkit-scrollbar {
      display: none;
    }

    .terminal-container {
      width: 70%;
      max-width: 700px;
      text-align: justify;
      word-break: break-all;
      line-height: 1.1;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      /* This color is very dark, making it hard to read against black */
      color: #1a1a1a; 
    }

    .lmli7safi {
      /* This is ONLY slightly lighter than the noise, making it the "hidden" text */
      color: #222; 
      display: inline;
    }

    /* When the user highlights text, the clue becomes much more visible */
    ::selection {
      background: #0f0;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="terminal-container" id="noise-box">
    <!-- Noise generated by script -->
  </div>

  <script>
    const box = document.getElementById('noise-box');
    const noiseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()';
    
    function generateNoise(len) {
      let str = '';
      for (let i = 0; i < len; i++) {
        str += noiseChars.charAt(Math.floor(Math.random() * noiseChars.length));
      }
      return str;
    }

    // Creating a massive wall of noise with the clue buried in the middle
    const topNoise = generateNoise(8000);
    const hiddenClue = '<span class="lmli7safi">good_job_now_get_back_and_find_the_robots</span>';
    const bottomNoise = generateNoise(8000);

    box.innerHTML = topNoise + hiddenClue + bottomNoise;
  </script>
</body>
</html>
