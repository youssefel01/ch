<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404_NOT_FOUND</title>
  <style>
    body {
      background: #ffffff;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
    }
    .meme-img {
      max-width: 400px;
      max-height: 400px;
      border: 5px solid #000;
      box-shadow: 10px 10px 0px #eee;
      margin-bottom: 20px;
    }
    .error-code {
      font-size: 80px;
      font-weight: bold;
      color: #000;
      letter-spacing: 5px;
    }
    .msg {
      font-size: 18px;
      color: #333;
    }
  </style>
</head>
<body>
  <img id="meme" class="meme-img" src="" alt="404 Meme">
  <div class="error-code">404</div>
  <div class="msg">SYSTEM_FAILURE: RESOURCE_NOT_FOUND</div>

  <script>
    // Randomly pick one of the 7 images
    const totalMemes = 7;
    const randomNum = Math.floor(Math.random() * totalMemes) + 1;
    document.getElementById('meme').src = `/meme/${randomNum}.jpg`;
  </script>
</body>
</html>
